    <body>
        <h1>Kolay Hesap Makinesi</h1>
        <input type="number" id="sayi1" placeholder="İlk Sayı"></input>
        <input type="number" id="sayi2" placeholder="İkinci Sayı"></input>
        <button onclick="topla()">Topla</button>
        <button onclick="cikar()">Çıkar</button>
        <button onclick="carp()">Çarp</button>
        <button onclick="bol()">Böl</button>
        <h2 id="sonucEkrani">Sonuç</h2>
        
        <script>
            let kutu1 = document.getElementById("sayi1");
            let kutu2 = document.getElementById("sayi2");
            let sonucYazisi = document.getElementById("sonucEkrani");


            //Toplama İşlemi

            function topla() {
                let s1 = Number(kutu1.value);
                let s2 = Number(kutu2.value);
                let sonuc = s1 + s2;
                sonucYazisi.innerText = "Sonuç: " + sonuc;
            }

            //Çıkarma İşlemi

            function cikar() {
                let sonuc = Number(kutu1.value) - Number(kutu2.value);
                sonucYazisi.innerText = "Sonuç: " + sonuc;
            }

            //Çarpma İşlemi
            function carp() {
                let sonuc = Number(kutu1.value) * Number(kutu2.value);
                sonucYazisi.innerText = "Sonuç: " + sonuc;
            }

            //Bölme İşlemi
            function bol() {
                let sonuc = Number(kutu1.value) / Number(kutu2.value);
                sonucYazisi.innerText = "Sonuç: " + sonuc;
            }


        </script>
    </body>
</html>
